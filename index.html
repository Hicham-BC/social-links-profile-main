<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Social links profile</title>
  <link rel="stylesheet" href="styles.css">

</head>
<body>

  <main>
    <article class="profile-card">
      <div class="profile">
        <img class="profile-avatar" src="assets/images/avatar-jessica.jpeg" alt="Jessica Randall">
        <h1 class="profile-name">Jessica Randall</h1>
        <p class="profile-location">London, United Kingdom</p>
        <p class="profile-bio">"Front-end developer and avid reader"</p>
      </div>
      <ul class="social-links">
        <li><a href="#" class="social-link">GitHub</a></li>
        <li><a href="#" class="social-link">Frontend Mentor</a></li>
        <li><a href="#" class="social-link">LinkedIn</a></li>
        <li><a href="#" class="social-link">Twitter</a></li>
        <li><a href="#" class="social-link">Instagram</a></li>
      </ul>
    </article>
  </main>
  
</body>
</html>
